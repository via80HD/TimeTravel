<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Traveler</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --input-bg: #f0f0f0;
            --accent: #2563eb;
            --disabled: #cccccc;
            --border: #dddddd;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --text: #e0e0e0;
            --input-bg: #1e1e1e;
            --accent: #3b82f6;
            --disabled: #333333;
            --border: #444444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        input, textarea {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text);
            font-size: 1rem;
        }

        .rr-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .rr-row {
            display: flex;
            gap: 10px;
        }

        .add-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 15px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .btn-stack {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 2rem;
        }

        button.action-btn {
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        #clock-in { background-color: #22c55e; color: white; }
        #clock-out { background-color: #ef4444; color: white; }

        button:disabled {
            background-color: var(--disabled) !important;
            color: #888888;
            cursor: not-allowed;
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <header>
            <h1>Tracker</h1>
            <button class="theme-toggle" onclick="toggleTheme()">Theme</button>
        </header>

        <div class="form-group">
            <label>Date</label>
            <input type="date" id="date-picker">
        </div>

        <div class="form-group">
            <label>Time</label>
            <input type="time" id="time-picker">
        </div>

        <div class="form-group">
            <label>Notes</label>
            <textarea id="notes" rows="3" placeholder="Shift notes..."></textarea>
        </div>

        <div class="form-group" id="rr-group">
            <label>RR # (YYYYMMDD####)</label>
            <div class="rr-container" id="rr-inputs">
                <div class="rr-row">
                    <input type="number" class="rr-input" placeholder="202604150001" oninput="validateRR(this)">
                    <button class="add-btn" onclick="addRRField()">+</button>
                </div>
            </div>
        </div>

        <div class="btn-stack">
            <button id="clock-in" class="action-btn" onclick="handleClock('in')">Clock In</button>
            <button id="clock-out" class="action-btn" onclick="handleClock('out')" disabled>Clock Out</button>
        </div>
    </div>

    <script>
        // Set Defaults
        const now = new Date();
        document.getElementById('date-picker').value = now.toISOString().split('T')[0];
        document.getElementById('time-picker').value = now.toTimeString().slice(0,5);

        let isClockedIn = false;
        let clockInData = {};

        function toggleTheme() {
            const body = document.body;
            body.dataset.theme = body.dataset.theme === 'dark' ? 'light' : 'dark';
        }

        function addRRField() {
            const container = document.getElementById('rr-inputs');
            const newRow = document.createElement('div');
            newRow.className = 'rr-row';
            newRow.innerHTML = `
                <input type="number" class="rr-input" placeholder="202604150002" oninput="validateRR(this)">
            `;
            container.appendChild(newRow);
        }

        function validateRR(input) {
            if (input.value.length > 12) {
                input.value = input.value.slice(0, 12);
            }
        }

        function handleClock(type) {
            const date = document.getElementById('date-picker').value;
            const time = document.getElementById('time-picker').value;
            const notes = document.getElementById('notes').value;
            const rrNumbers = Array.from(document.querySelectorAll('.rr-input')).map(i => i.value);

            if (type === 'in') {
                clockInData = { date, time, notes, rrNumbers };
                isClockedIn = true;
                document.getElementById('clock-in').disabled = true;
                document.getElementById('clock-out').disabled = false;
                alert("Clocked in at " + time);
            } else {
                const finalData = {
                    ...clockInData,
                    outDate: date,
                    outTime: time,
                    finalNotes: notes,
                    allRR: rrNumbers.join(', ')
                };
                sendToGoogleSheet(finalData);
            }
        }

        async function sendToGoogleSheet(data) {
            // Replace with your Google Apps Script Web App URL
            const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxy18G2RnR4b6K-WGSp5kZ5InM7pTj5x_6LHGy2AoQwO-D63q6o0PBdA83DshnU2Zw/exec';
            
            try {
                // In a real scenario, you'd fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(data) })
                console.log("Sending data:", data);
                alert("Data sent to Google Sheets successfully.");
                
                // Reset State
                isClockedIn = false;
                document.getElementById('clock-in').disabled = false;
                document.getElementById('clock-out').disabled = true;
            } catch (e) {
                alert("Error sending data.");
            }
        }
    </script>
</body>
</html>
